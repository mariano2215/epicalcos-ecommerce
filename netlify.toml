[dev]
  command   = "npm run dev --prefix frontend"
  targetPort = 5173
  port      = 8888
  publish   = "frontend/dist"
  autoLaunch = false

[build]
  base    = "frontend"
  publish = "dist"
  # Instala deps del frontend (vite) Y de la raíz (mercadopago para las Functions).
  # Necesario porque, al haber package.json en la raíz, Netlify no instala solo el de frontend.
  command = "npm ci && npm ci --prefix .. && npm run build"
  # exit ≠ 0 ⇒ Netlify NO saltea el build, aunque el push solo toque archivos
  # fuera de base="frontend" (p. ej. netlify/functions/* o la raíz). Sin esto,
  # un cambio function-only queda "Canceled — no content change" y no se deploya.
  ignore = "exit 1"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Carpeta de funciones relativa a la raíz del repo (NO al `base`).
  directory = "../netlify/functions"
  node_bundler = "esbuild"

# ── Headers de seguridad (aplican a los archivos estáticos del sitio) ──
# La CSP está en modo Report-Only: no bloquea nada, solo reporta violaciones
# en la consola del navegador. Cuando se verifique que GTM/GA4/Meta Pixel no
# rompen nada, renombrar a "Content-Security-Policy" para que aplique en serio.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://www.googletagmanager.com https://www.facebook.com; frame-src https://www.googletagmanager.com https://td.doubleclick.net; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

# Redirects /api/* → /.netlify/functions/* (URLs limpias en el frontend)
[[redirects]]
  from   = "/api/create-preference"
  to     = "/.netlify/functions/create-preference"
  status = 200

[[redirects]]
  from   = "/api/create-order-transfer"
  to     = "/.netlify/functions/create-order-transfer"
  status = 200

[[redirects]]
  from   = "/api/capture-lead"
  to     = "/.netlify/functions/capture-lead"
  status = 200

[[redirects]]
  from   = "/api/mercadopago-webhook"
  to     = "/.netlify/functions/mercadopago-webhook"
  status = 200

# SPA fallback (debe ir DESPUÉS de los redirects de /api/*)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
