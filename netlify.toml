[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Carpeta de funciones relativa a la raíz del repo (NO al `base`).
  directory = "../netlify/functions"
  node_bundler = "esbuild"

# Redirects /api/* → /.netlify/functions/* (URLs limpias en el frontend)
[[redirects]]
  from   = "/api/create-preference"
  to     = "/.netlify/functions/create-preference"
  status = 200

[[redirects]]
  from   = "/api/mercadopago-webhook"
  to     = "/.netlify/functions/mercadopago-webhook"
  status = 200

# SPA fallback (debe ir DESPUÉS de los redirects de /api/*)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
