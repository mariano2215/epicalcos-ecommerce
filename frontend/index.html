<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <title>EPICALCOS · Calcos premium para personalizar lo que quieras</title>
    <meta name="description" content="Calcomanías personalizadas, stickers premium, vinilos decorativos y fotos Polaroid en Rosario. Resistentes al agua y al sol. Comprá online con Mercado Pago." />
    <link rel="canonical" href="https://epicalcos.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EPICALCOS" />
    <meta property="og:title" content="EPICALCOS · Calcos premium para personalizar lo que quieras" />
    <meta property="og:description" content="Stickers personalizados resistentes al agua y al sol. Pagá online con Mercado Pago." />
    <meta property="og:url" content="https://epicalcos.com/" />
    <meta property="og:locale" content="es_AR" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="EPICALCOS · Calcos premium" />
    <meta name="twitter:description" content="Stickers personalizados resistentes al agua y al sol." />

    <!-- Preconnects + fuentes (carga no-bloqueante: print → all on load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;800;900&display=swap"
      />
    </noscript>

    <!-- JSON-LD Organization (estático en raíz) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "EPICALCOS",
        "url": "https://epicalcos.com",
        "description": "Calcomanías personalizadas, stickers premium, vinilos decorativos y fotos Polaroid en Rosario.",
        "email": "epicalcos@gmail.com",
        "sameAs": ["https://instagram.com/epicalcos"],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Rosario",
          "addressRegion": "Santa Fe",
          "addressCountry": "AR"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "email": "epicalcos@gmail.com",
          "telephone": "+5493416806675",
          "areaServed": "AR",
          "availableLanguage": ["Spanish"]
        }
      }
    </script>

    <!--
      Google Tag Manager — se activa solo si VITE_GTM_ID está definido.
      El snippet completo se inyecta desde main.jsx para poder leer la env var.
    -->
  </head>
  <body>
    <!-- GTM noscript fallback se inyecta también desde main.jsx si hay ID -->
    <!-- Meta Pixel noscript fallback -->
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=2255395355265661&ev=PageView&noscript=1"/></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
